name: svelte-go-task-app

services:
  postgres:
    image: postgres:17-alpine
    container_name: svelte-go-task-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: svelteGoTest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/internal/adapters/postgresql/initdb:/docker-entrypoint-initdb.d:ro
      - ./backend/internal/adapters/postgresql/migrations:/migrations:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d svelteGoTest" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svelte-go-task-app-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8000"
      GOOSE_DBSTRING: "host=postgres user=postgres password=qwerty123
        dbname=svelteGoTest port=5432 sslmode=disable"
      FRONTEND_URL: http://localhost:3000
      COOKIE_SECURE: "false"
      SESSION_SECRET: change-me-to-a-long-random-string
      SESSION_DURATION_MINUTES: "1440"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@taskify.local
      SMTP_TO: contact@taskify.local
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: svelte-go-task-app-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    command: [ "pnpm", "dev", "--host", "0.0.0.0", "--port", "3000" ]
    ports:
      - "3000:3000"
    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    restart: unless-stopped
    ports:
      - 8025:8025
      - 1025:1025
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
